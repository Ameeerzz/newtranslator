<!DOCTYPE html>
<html>
<head>
  <title>Pro Translator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <div class="box">

    <h2>🌐 Translator</h2>

    <!-- INPUT -->
    <textarea id="inputText" placeholder="Enter text here..."></textarea>

    <!-- CONTROLS -->
    <div class="controls">
      <button onclick="swapLang()">⇄</button>

      <select id="fromLang">
        <option value="en">English</option>
        <option value="hi">Hindi</option>
        <option value="fr">French</option>
        <option value="de">German</option>
      </select>

      <select id="toLang">
        <option value="hi">Hindi</option>
        <option value="en">English</option>
        <option value="fr">French</option>
        <option value="de">German</option>
      </select>
    </div>

    <!-- BUTTON -->
    <button class="translate-btn" onclick="translateText()">Translate</button>

    <!-- OUTPUT -->
    <textarea id="outputText" placeholder="Translation..." readonly></textarea>

    <!-- ACTION -->
    <button class="copy-btn" onclick="copyText()">📋 Copy</button>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
